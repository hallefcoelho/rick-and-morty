name: Rick And Morty

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Aviso início
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"🚀 Pipeline iniciada\n👤 Autor: ${{ github.actor }}\n🌿 Branch: ${{ github.ref_name }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: 📥 Checkout projeto
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🏗️ Build Angular
        run: npm run build

      - name: ✅ Card sucesso
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "✅ Pipeline Finalizada"
          description: "Build Angular executada com sucesso"
          color: 0x57F287

      - name: ❌ Card falha
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "❌ Pipeline Falhou"
          description: "Erro durante a execução da pipeline"
          color: 0xED4245
